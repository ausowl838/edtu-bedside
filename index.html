<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDTU Bedside Display — NUH</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:        #0a0f1a;
    --panel:     #111827;
    --border:    #1e2d45;
    --accent:    #1d6fa4;
    --accent-lt: #2389cc;
    --text:      #e8edf5;
    --muted:     #7a8fa8;
    --font-ui:   'Segoe UI', system-ui, sans-serif;
    --font-data: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-ui); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .app-header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; letter-spacing: .03em; }
  .logo span { color: var(--accent-lt); }
  .nuh-badge { font-size: 11px; font-weight: 600; background: var(--accent); color: #fff; padding: 3px 8px; border-radius: 4px; letter-spacing: .06em; }
  .view-toggle { display: flex; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
  .view-toggle button { background: none; border: none; color: var(--muted); font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 5px; cursor: pointer; transition: all .15s; letter-spacing: .04em; }
  .view-toggle button.active { background: var(--accent); color: #fff; }
  .conn-bar { font-size: 11px; padding: 3px 10px; border-radius: 4px; font-weight: 600; }
  .conn-bar.connecting { background: rgba(180,83,9,.2); color: #fbbf24; border: 1px solid rgba(180,83,9,.4); }
  .conn-bar.live { background: rgba(26,127,90,.2); color: #34d399; border: 1px solid rgba(52,211,153,.3); }
  .conn-bar.error { background: rgba(153,27,27,.2); color: #f87171; border: 1px solid rgba(248,113,113,.3); }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* ADMIN LAYOUT */
  .admin-layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 57px); }
  .admin-sidebar { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-header h3 { font-size: 12px; font-weight: 700; letter-spacing: .06em; color: var(--muted); text-transform: uppercase; }
  .bed-list { flex: 1; overflow-y: auto; padding: 8px; }
  .bed-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; transition: background .1s; border: 1px solid transparent; margin-bottom: 3px; }
  .bed-item:hover { background: rgba(29,111,164,.12); }
  .bed-item.selected { background: rgba(29,111,164,.2); border-color: var(--accent); }
  .bed-num { width: 34px; height: 34px; background: var(--bg); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--accent-lt); flex-shrink: 0; border: 1px solid var(--border); }
  .bed-item.occupied .bed-num { background: var(--accent); color: #fff; border-color: var(--accent); }
  .bed-info { flex: 1; min-width: 0; }
  .bed-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bed-sub  { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alert-dot { width: 7px; height: 7px; border-radius: 50%; background: #ef4444; flex-shrink: 0; display: none; }
  .bed-item.has-alerts .alert-dot { display: block; }

  /* EDIT PANEL */
  .edit-panel { padding: 22px 26px; overflow-y: auto; }
  .edit-panel h2 { font-size: 16px; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
  .bed-tag { font-size: 11px; font-weight: 600; background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 4px; letter-spacing: .04em; }
  .form-section { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 14px; }
  .form-section h4 { font-size: 10px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .form-row { margin-bottom: 12px; }
  .form-row:last-child { margin-bottom: 0; }
  .form-row label { font-size: 11px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 4px; }
  .form-row input, .form-row textarea, .form-row select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--font-ui); font-size: 14px; padding: 8px 11px; border-radius: 6px; transition: border-color .15s; }
  .form-row input:focus, .form-row textarea:focus, .form-row select:focus { outline: none; border-color: var(--accent-lt); }
  .form-row select option { background: #1a2535; }
  .col-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* ALERT TOGGLES */
  .alert-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .alert-toggle { display: flex; align-items: center; gap: 9px; padding: 10px 12px; background: var(--bg); border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: all .15s; user-select: none; }
  .alert-toggle:hover { border-color: var(--accent); }
  .alert-toggle.on { border-color: #f97316; background: rgba(249,115,22,.08); }
  .alert-toggle.on.danger-alert { border-color: #ef4444; background: rgba(239,68,68,.08); }
  .alert-icon { font-size: 17px; }
  .alert-label { font-size: 12px; font-weight: 600; flex: 1; }
  .toggle-pip { width: 18px; height: 18px; border-radius: 50%; background: var(--border); transition: all .15s; flex-shrink: 0; }
  .alert-toggle.on .toggle-pip { background: #f97316; }
  .alert-toggle.on.danger-alert .toggle-pip { background: #ef4444; }

  /* FORM ACTIONS */
  .form-actions { display: flex; gap: 10px; align-items: center; margin-top: 2px; }
  .btn { padding: 9px 18px; border-radius: 7px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-lt); }
  .btn-danger { background: rgba(127,29,29,.3); color: #fca5a5; border: 1px solid rgba(220,38,38,.3); }
  .btn-danger:hover { background: rgba(127,29,29,.5); }
  .btn-ghost { background: var(--panel); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); }
  .save-status { font-size: 12px; padding: 7px 12px; border-radius: 6px; display: none; align-items: center; gap: 6px; margin-left: auto; }
  .save-status.ok  { display: flex; background: rgba(26,127,90,.2); color: #34d399; border: 1px solid rgba(52,211,153,.25); }
  .save-status.err { display: flex; background: rgba(127,29,29,.2); color: #f87171; border: 1px solid rgba(248,113,113,.25); }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80%; color: var(--muted); gap: 10px; }
  .empty-state .icon { font-size: 38px; opacity: .35; }
  .empty-state p { font-size: 13px; }

  /* BEDSIDE DISPLAY */
  .bedside-container { min-height: calc(100vh - 57px); padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .bedside-selector { display: flex; align-items: center; gap: 12px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; }
  .bedside-selector label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
  .bedside-selector select { background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 14px; font-weight: 700; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; margin-left: auto; box-shadow: 0 0 0 0 rgba(34,197,94,.4); animation: pulse-live 2s infinite; }
  @keyframes pulse-live { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,.4); } 70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }
  .live-label { font-size: 11px; color: #22c55e; font-weight: 700; }

  /* PATIENT CARD — bedside */
  .patient-card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }

  .card-header {
    background: linear-gradient(135deg, #0c1e33 0%, #0e2844 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  }
  .card-bed-num {
    font-size: 15px; font-weight: 700; letter-spacing: .1em;
    color: var(--accent-lt); text-transform: uppercase; margin-bottom: 8px;
  }
  .card-salutation {
    font-size: 22px; font-weight: 600; color: var(--muted); margin-bottom: 2px;
  }
  .card-patient-name {
    font-size: 52px; font-weight: 800; line-height: 1.05; letter-spacing: -.01em;
  }

  /* Date block — top right */
  .card-date-block {
    text-align: right;
    flex-shrink: 0;
  }
  .card-date-block .date-str {
    font-size: 22px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .01em;
    line-height: 1.3;
  }

  /* ALERT BADGES */
  .alerts-row { display: flex; flex-wrap: wrap; gap: 12px; padding: 20px 32px; border-bottom: 1px solid var(--border); }
  .alert-badge { display: flex; align-items: center; gap: 10px; padding: 14px 22px; border-radius: 10px; font-size: 18px; font-weight: 800; letter-spacing: .02em; border: 2px solid; animation: badge-in .2s ease; }
  @keyframes badge-in { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .alert-badge .ab-icon { font-size: 22px; }
  .alert-badge.nil-mouth    { background: #fff7ed; color: #9a3412; border-color: #f97316; }
  .alert-badge.fall-risk    { background: #fefce8; color: #854d0e; border-color: #eab308; }
  .alert-badge.contact-prec { background: #f0fdf4; color: #166534; border-color: #22c55e; }
  .alert-badge.oxygen       { background: #eff6ff; color: #1e40af; border-color: #3b82f6; }
  .alert-badge.allergy      { background: #fdf4ff; color: #7e22ce; border-color: #a855f7; }
  .alert-badge.ccm          { background: #fff1f2; color: #9f1239; border-color: #f43f5e; }
  .alert-badge.strict-io    { background: #f0f9ff; color: #075985; border-color: #0ea5e9; }
  .alert-badge.diet-nd      { background: #faf5ff; color: #6b21a8; border-color: #c084fc; }

  /* CARD BODY */
  .card-body { padding: 22px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .info-block { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
  .info-block.full-width { grid-column: 1 / -1; }
  .ib-label { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  .ib-value { font-size: 24px; font-weight: 700; line-height: 1.3; }

  .no-patient { padding: 80px 24px; text-align: center; color: var(--muted); }
  .no-patient .icon { font-size: 52px; opacity: .25; margin-bottom: 14px; }
  .no-patient p { font-size: 18px; }

  /* GRID VIEW */
  .grid-view-container { padding: 20px; }
  .grid-view-container h2 { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; }
  .beds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .grid-bed-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 13px; cursor: pointer; transition: border-color .15s; }
  .grid-bed-card:hover { border-color: var(--accent); }
  .grid-bed-card.occupied { border-left: 3px solid var(--accent); }
  .grid-bed-card.has-critical { border-left: 3px solid #ef4444; }
  .gbc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .gbc-bed { font-size: 10px; font-weight: 700; color: var(--accent-lt); letter-spacing: .07em; }
  .gbc-name { font-size: 13px; font-weight: 700; line-height: 1.3; }
  .gbc-doctor { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .gbc-alerts { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 7px; }
  .mini-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; border: 1px solid; }

  /* MISC */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent-lt); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 700px) {
    .admin-layout { grid-template-columns: 1fr; }
    .admin-sidebar { height: 200px; }
    .card-body { grid-template-columns: 1fr; }
    .card-patient-name { font-size: 32px; }
    .alert-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo"><span>EDTU</span>&nbsp;Bedside Display <span class="nuh-badge">NUH</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="connBar" class="conn-bar connecting"><span class="spinner"></span> Connecting…</span>
    <div class="view-toggle">
      <button id="btnAdmin"   onclick="setView('admin')"   class="active">📋 Admin</button>
      <button id="btnBedside" onclick="setView('bedside')">🖥 Bedside</button>
      <button id="btnGrid"    onclick="setView('grid')">🗂 All Beds</button>
    </div>
  </div>
</header>

<!-- ADMIN -->
<div id="viewAdmin" class="view active">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <h3>Beds (16)</h3>
        <button class="btn btn-ghost" style="font-size:11px;padding:3px 9px;" onclick="loadFromSupabase()">↻</button>
      </div>
      <div class="bed-list" id="bedList"></div>
    </aside>
    <main class="edit-panel" id="editPanel">
      <div class="empty-state">
        <div class="icon">🛏</div>
        <p>Select a bed from the left to edit patient information</p>
      </div>
    </main>
  </div>
</div>

<!-- BEDSIDE -->
<div id="viewBedside" class="view">
  <div class="bedside-container">
    <div class="bedside-selector">
      <label>Bed</label>
      <select id="bedsideSelect" onchange="renderBedside()"></select>
      <div class="live-dot"></div>
      <span class="live-label">LIVE</span>
      <span style="font-size:11px;color:var(--muted);margin-left:6px;" id="bedsideTime"></span>
    </div>
    <div id="bedsideCard"></div>
  </div>
</div>

<!-- GRID -->
<div id="viewGrid" class="view">
  <div class="grid-view-container">
    <h2>All Beds — EDTU Overview</h2>
    <div class="beds-grid" id="bedsGrid"></div>
  </div>
</div>

<script>
const SUPA_URL = 'https://rhkvarnydxlwaiuznvrz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoa3Zhcm55ZHhsd2FpdXpudnJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTcxNDEsImV4cCI6MjA5Nzk5MzE0MX0.5yQvalFR7ALsVOuTS3jxUo6AU2xxuk2M6pu15Hd4I24';
const BED_COUNT = 16;

const ALERT_DEFS = [
  { key:'alert_nbm',       label:'Nil by Mouth',        icon:'🚫', cls:'nil-mouth',    danger:true  },
  { key:'alert_fall',      label:'Fall Risk',           icon:'⚠️', cls:'fall-risk',    danger:true  },
  { key:'alert_allergy',   label:'Known Allergy',       icon:'💊', cls:'allergy',      danger:true  },
  { key:'alert_o2',        label:'O₂ Dependent',        icon:'💨', cls:'oxygen',       danger:false },
  { key:'alert_contact',   label:'Contact Precautions', icon:'🧤', cls:'contact-prec', danger:false },
  { key:'alert_ccm',       label:'CCM',                 icon:'🏥', cls:'ccm',          danger:true  },
  { key:'alert_strict_io', label:'Strict I/O',          icon:'📊', cls:'strict-io',    danger:false },
  { key:'alert_diet_nd',   label:'Diet (Non-Dairy)',    icon:'🥛', cls:'diet-nd',      danger:false },
];

let patients = {};
let selectedBed = null;
let sb = null;

function initPatients() {
  for (let i = 1; i <= BED_COUNT; i++) {
    const k = 'BED ' + String(i).padStart(2,'0');
    patients[k] = patients[k] || blankPatient(k);
  }
}

function blankPatient(bed) {
  return { bed_number:bed, full_name:'', gender:'', doctor:'', apn:'',
    alert_nbm:false, alert_fall:false, alert_allergy:false,
    alert_o2:false, alert_contact:false,
    alert_ccm:false, alert_strict_io:false, alert_diet_nd:false,
    updated_at:null };
}

// ── SUPABASE ──────────────────────────────────────────────────────
async function initSupabase() {
  try {
    sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    await loadFromSupabase();
    subscribeRealtime();
    setConn('live','🟢 LIVE — Supabase');
  } catch(e) {
    setConn('error','⚠ Connection error');
    console.error(e);
  }
}

async function loadFromSupabase() {
  if (!sb) return;
  const { data, error } = await sb.from('patients').select('*');
  if (error) { console.warn('Load error:', error); return; }
  (data||[]).forEach(r => { patients[r.bed_number] = r; });
  renderBedList();
  populateBedsideSelect();
  renderGrid();
}

function subscribeRealtime() {
  sb.channel('edtu-patients')
    .on('postgres_changes', { event:'*', schema:'public', table:'patients' }, payload => {
      const r = payload.new || payload.old;
      if (r && r.bed_number) patients[r.bed_number] = r;
      renderBedList();
      if (document.getElementById('viewBedside').classList.contains('active')) renderBedside();
      if (document.getElementById('viewGrid').classList.contains('active')) renderGrid();
    }).subscribe();
}

function setConn(cls, txt) {
  const el = document.getElementById('connBar');
  el.className = 'conn-bar ' + cls;
  el.innerHTML = txt;
}

// ── VIEW MANAGEMENT ───────────────────────────────────────────────
function setView(v) {
  ['admin','bedside','grid'].forEach(id => {
    const cap = id.charAt(0).toUpperCase()+id.slice(1);
    document.getElementById('view'+cap).classList.toggle('active', id===v);
    document.getElementById('btn'+cap).classList.toggle('active', id===v);
  });
  if (v==='bedside') renderBedside();
  if (v==='grid')    renderGrid();
  if (v==='admin')   renderBedList();
}

// ── BED LIST ──────────────────────────────────────────────────────
function renderBedList() {
  const list = document.getElementById('bedList');
  list.innerHTML = '';
  Object.values(patients).forEach(p => {
    const occupied = !!p.full_name;
    const hasAlerts = ALERT_DEFS.some(a => p[a.key]);
    const div = document.createElement('div');
    div.className = ['bed-item', occupied&&'occupied', hasAlerts&&'has-alerts', selectedBed===p.bed_number&&'selected'].filter(Boolean).join(' ');
    div.innerHTML = `
      <div class="bed-num">${p.bed_number.replace('BED ','')}</div>
      <div class="bed-info">
        <div class="bed-name">${p.full_name || '<span style="color:var(--muted);font-style:italic;font-weight:400;">Unoccupied</span>'}</div>
        <div class="bed-sub">${p.doctor?'Dr '+p.doctor:p.bed_number}</div>
      </div>
      <div class="alert-dot"></div>`;
    div.onclick = () => selectBed(p.bed_number);
    list.appendChild(div);
  });
}

function selectBed(k) {
  selectedBed = k;
  renderBedList();
  renderEditForm(patients[k]);
}

// ── EDIT FORM (PSA Admin — simplified) ───────────────────────────
function renderEditForm(p) {
  document.getElementById('editPanel').innerHTML = `
    <h2>Patient Record <span class="bed-tag">${p.bed_number}</span></h2>

    <div class="form-section">
      <h4>Patient Information</h4>
      <div class="form-row">
        <label>Full Name (as per IC)</label>
        <input id="f_name" type="text" value="${esc(p.full_name)}" placeholder="e.g. TAN AH KOW"
          style="text-transform:uppercase;font-weight:600;font-size:16px;"
          oninput="this.value=this.value.toUpperCase()" />
      </div>
      <div class="form-row">
        <label>Gender</label>
        <select id="f_gender">
          <option value="">— Select —</option>
          <option value="Male"   ${p.gender==='Male'?'selected':''}>Male</option>
          <option value="Female" ${p.gender==='Female'?'selected':''}>Female</option>
        </select>
      </div>
    </div>

    <div class="form-section">
      <h4>Clinical Assignment</h4>
      <div class="col-grid-2">
        <div class="form-row">
          <label>Attending Doctor</label>
          <input id="f_doctor" type="text" value="${esc(p.doctor)}" placeholder="e.g. LIM BOON KENG"
            oninput="this.value=this.value.toUpperCase()" />
        </div>
        <div class="form-row">
          <label>Attending APN</label>
          <input id="f_apn" type="text" value="${esc(p.apn||'')}" placeholder="e.g. TAN HUILING"
            oninput="this.value=this.value.toUpperCase()" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <h4>Alerts &amp; Precautions</h4>
      <div class="alert-grid">
        ${ALERT_DEFS.map(a=>`
          <div class="alert-toggle ${p[a.key]?'on':''}${p[a.key]&&a.danger?' danger-alert':''}"
               id="tog_${a.key}" onclick="togAlert('${a.key}',${a.danger})">
            <span class="alert-icon">${a.icon}</span>
            <span class="alert-label">${a.label}</span>
            <div class="toggle-pip"></div>
          </div>`).join('')}
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveBed()">💾 Save</button>
      <button class="btn btn-danger"  onclick="clearBed()">🗑 Discharge / Clear</button>
      <div id="ss" class="save-status"></div>
    </div>`;
}

function togAlert(key, danger) {
  const el = document.getElementById('tog_'+key);
  const on = el.classList.toggle('on');
  el.classList.toggle('danger-alert', on && danger);
}

async function saveBed() {
  if (!selectedBed) return;
  const updated = {
    ...patients[selectedBed],
    full_name:  document.getElementById('f_name').value.toUpperCase().trim(),
    gender:     document.getElementById('f_gender').value,
    doctor:     document.getElementById('f_doctor').value.toUpperCase().trim(),
    apn:        document.getElementById('f_apn').value.toUpperCase().trim(),
    updated_at: new Date().toISOString(),
  };
  ALERT_DEFS.forEach(a => { updated[a.key] = document.getElementById('tog_'+a.key).classList.contains('on'); });
  patients[selectedBed] = updated;

  if (sb) {
    const { error } = await sb.from('patients').upsert(updated, { onConflict:'bed_number' });
    showSS(error?'err':'ok', error?'✗ '+error.message:'✓ Saved');
  } else {
    showSS('ok','✓ Saved (local)');
  }
  renderBedList();
}

async function clearBed() {
  if (!selectedBed || !confirm(`Discharge & clear ${selectedBed}?`)) return;
  const blank = blankPatient(selectedBed);
  blank.updated_at = new Date().toISOString();
  patients[selectedBed] = blank;
  if (sb) await sb.from('patients').upsert(blank, { onConflict:'bed_number' });
  renderBedList();
  renderEditForm(blank);
  showSS('ok','✓ Bed cleared');
}

function showSS(cls, msg) {
  const el = document.getElementById('ss');
  el.textContent = msg; el.className = 'save-status '+cls;
  setTimeout(()=>{ el.className='save-status'; }, 3000);
}

// ── SALUTATION HELPER ─────────────────────────────────────────────
function getSalutation(gender) {
  if (gender === 'Male')   return 'MR.';
  if (gender === 'Female') return 'MS/MDM';
  return '';
}

// ── BEDSIDE DISPLAY ───────────────────────────────────────────────
function populateBedsideSelect() {
  const sel = document.getElementById('bedsideSelect');
  const cur = sel.value;
  sel.innerHTML = Object.keys(patients).map(k=>`<option value="${k}" ${k===cur?'selected':''}>${k}</option>`).join('');
}

function renderBedside() {
  const k = document.getElementById('bedsideSelect').value;
  if (!k) return;
  const p = patients[k] || blankPatient(k);

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-SG', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  document.getElementById('bedsideTime').textContent = 'Updated ' + now.toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit'});

  const card = document.getElementById('bedsideCard');
  if (!p.full_name) {
    card.innerHTML = `<div class="patient-card"><div class="no-patient"><div class="icon">🛏</div><p>${k} — No patient currently assigned</p></div></div>`;
    return;
  }

  const activeAlerts = ALERT_DEFS.filter(a=>p[a.key]);
  const salutation = getSalutation(p.gender);

  card.innerHTML = `
    <div class="patient-card">
      <div class="card-header">
        <div>
          <div class="card-bed-num">📍 ${p.bed_number}</div>
          ${salutation ? `<div class="card-salutation">${salutation}</div>` : ''}
          <div class="card-patient-name">${esc(p.full_name)}</div>
        </div>
        <div class="card-date-block">
          <div class="date-str">${dateStr}</div>
        </div>
      </div>
      ${activeAlerts.length ? `
        <div class="alerts-row">
          ${activeAlerts.map(a=>`<div class="alert-badge ${a.cls}"><span class="ab-icon">${a.icon}</span>${a.label}</div>`).join('')}
        </div>` : ''}
      <div class="card-body">
        <div class="info-block">
          <div class="ib-label">Attending Doctor</div>
          <div class="ib-value">Dr ${esc(p.doctor)||'—'}</div>
        </div>
        <div class="info-block">
          <div class="ib-label">Attending APN</div>
          <div class="ib-value">${esc(p.apn)||'—'}</div>
        </div>
      </div>
    </div>`;
}

// ── GRID VIEW ─────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('bedsGrid');
  grid.innerHTML = '';
  Object.values(patients).forEach(p => {
    const occupied = !!p.full_name;
    const alerts = ALERT_DEFS.filter(a=>p[a.key]);
    const critical = alerts.some(a=>a.danger);
    const div = document.createElement('div');
    div.className = 'grid-bed-card'+(occupied?' occupied':'')+(critical?' has-critical':'');
    div.innerHTML = `
      <div class="gbc-top">
        <span class="gbc-bed">${p.bed_number}</span>
        <span style="font-size:13px;">${alerts.map(a=>a.icon).join('')}</span>
      </div>
      <div class="gbc-name">${p.full_name||'<span style="color:var(--muted);font-style:italic;font-weight:400;">Unoccupied</span>'}</div>
      <div class="gbc-doctor">${p.doctor?'Dr '+p.doctor:''}</div>
      <div class="gbc-doctor">${p.apn?'APN '+p.apn:''}</div>
      ${alerts.length?`<div class="gbc-alerts">${alerts.map(a=>`<span class="mini-badge alert-badge ${a.cls}">${a.label}</span>`).join('')}</div>`:''}`;
    div.onclick = ()=>{ setView('admin'); selectBed(p.bed_number); };
    grid.appendChild(div);
  });
}

// ── UTILS ─────────────────────────────────────────────────────────
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── BOOT ──────────────────────────────────────────────────────────
initPatients();
populateBedsideSelect();
renderBedList();
initSupabase();

setInterval(()=>{
  if(document.getElementById('viewBedside').classList.contains('active')) renderBedside();
}, 30000);
</script>
</body>
</html>
